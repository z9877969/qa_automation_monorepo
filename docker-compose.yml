services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-headliner_db}
      MYSQL_USER: ${MYSQL_USER:-headliner}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-headliner_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./apps/backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./apps/backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: ${PORT:-5000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-headliner}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-headliner_pass}
      MYSQL_DB: ${MYSQL_DB:-headliner_db}
      APP_DOMAIN: ${APP_DOMAIN:-http://localhost:5000}
    volumes:
      - uploads:/app/public
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads:
